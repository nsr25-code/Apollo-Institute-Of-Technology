
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo Institute of Technology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .font-space { font-family: 'Space Grotesk', sans-serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        
        .blueprint-grid {
            background-image: linear-gradient(rgba(30, 58, 138, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(30, 58, 138, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(234, 179, 8, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
        }
        .pulse-gold { animation: pulse-gold 2s infinite; }

        @keyframes letter-reveal {
            0% {
                opacity: 0;
                transform: translateY(20px) rotateX(-45deg);
                filter: blur(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotateX(0deg);
                filter: blur(0);
            }
        }

        .reveal-letter {
            display: inline-block;
            opacity: 0;
            animation: letter-reveal 0.8s cubic-bezier(0.2, 0, 0.2, 1) forwards;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            width: max-content;
            animation: marquee 30s linear infinite;
        }
        .animate-marquee:hover {
            animation-play-state: paused;
        }

        /* Markdown Styles for Chatbot */
        .markdown-body ul {
            list-style-type: disc;
            margin-left: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .markdown-body p {
            margin-bottom: 0.5rem;
        }
        .markdown-body strong {
            color: #fff;
            font-weight: 700;
        }
    </style>
